<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--nvo-navy:#001965;--nvo-blue:#0057A8;--nvo-bright:#00A3E0;--nvo-red:#C8102E;
--up:#1D9E75;--down:#C8102E;--amber:#EF9F27;--live:#22c55e;
--page-bg:#F5F7FA;--card-bg:#FFFFFF;--border:#E0E4EA;
--text-primary:#1A1A2E;--text-secondary:#6B7280;--text-muted:#9CA3AF;
}
html{font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--page-bg);color:var(--text-primary);overflow-x:hidden}
.card{background:var(--card-bg);border:.5px solid var(--border);border-radius:10px;padding:16px;transition:transform 150ms ease}
.card:hover{transform:translateY(-2px)}
.card-static{background:var(--card-bg);border:.5px solid var(--border);border-radius:10px;padding:16px}
.label{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-secondary);font-weight:500}
.value{font-size:24px;font-weight:500;color:var(--text-primary);font-variant-numeric:tabular-nums}
.hero-value{font-size:40px;font-weight:500;font-variant-numeric:tabular-nums}
.sub{font-size:12px;color:var(--text-muted)}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;border:1px solid rgba(255,255,255,.3);white-space:nowrap}
.pill-green{background:var(--up);color:#fff;border:none}
.pill-red{background:var(--down);color:#fff;border:none}
.pill-amber{background:var(--amber);color:#fff;border:none}
.pill-blue{background:var(--nvo-blue);color:#fff;border:none}
.pill-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid-2-left{display:grid;grid-template-columns:300px 1fr;gap:12px}
.flex{display:flex;align-items:center}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.gap-4{gap:4px}.gap-8{gap:8px}.gap-12{gap:12px}.gap-16{gap:16px}
.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mb-8{margin-bottom:8px}
.text-up{color:var(--up)}.text-down{color:var(--down)}.text-amber{color:var(--amber)}
.tab-content{padding:20px 24px 44px;max-width:1200px;margin:0 auto;animation:fadeIn 200ms ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--live);animation:pulse 2s ease infinite;flex-shrink:0}
.topbar{background:var(--nvo-navy);height:52px;display:flex;align-items:center;padding:0 24px;color:#fff;gap:10px;position:sticky;top:0;z-index:110;flex-wrap:nowrap}
.topbar::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--nvo-blue)}
.topbar .divider{width:1px;height:24px;background:rgba(255,255,255,.2);flex-shrink:0}
.banner{background:#F0F4FF;height:28px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;font-size:12px;color:var(--text-secondary);border-bottom:.5px solid var(--border);position:sticky;top:52px;z-index:105}
.tab-bar{background:#fff;border-bottom:.5px solid var(--border);display:flex;padding:0 24px;gap:0;justify-content:center;position:sticky;top:80px;z-index:100}
.tab-btn{padding:10px 20px;font-size:14px;font-weight:500;color:var(--text-secondary);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 150ms}
.tab-btn.active{color:var(--nvo-blue);border-bottom-color:var(--nvo-blue)}
.tab-btn:hover{color:var(--nvo-blue)}
.status-bar{position:fixed;bottom:0;left:0;right:0;height:28px;background:var(--page-bg);border-top:.5px solid var(--border);display:flex;align-items:center;justify-content:center;padding:0 24px;font-size:12px;color:var(--text-secondary);z-index:100}
.bar-track{height:6px;background:#E5E7EB;border-radius:3px;flex:1;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 600ms ease}
.engine-card{border-left:3px solid;padding:16px;cursor:pointer;transition:all 200ms}
.engine-card:hover{transform:translateY(-2px)}
.scatter-dot{cursor:pointer;transition:all 150ms}
.scatter-dot:hover{r:8;opacity:1}
.toggle-container{display:flex;border:1px solid rgba(255,255,255,.4);border-radius:99px;overflow:hidden}
.toggle-btn{padding:3px 12px;font-size:11px;font-weight:500;cursor:pointer;background:transparent;color:rgba(255,255,255,.7);border:none;transition:all 150ms}
.toggle-btn.active{background:#fff;color:var(--nvo-navy)}
.chat-fab{position:fixed;bottom:44px;right:24px;z-index:200;cursor:pointer}
.chat-fab-btn{width:48px;height:48px;border-radius:50%;background:var(--nvo-navy);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.15);transition:transform 150ms}
.chat-fab-btn:hover{transform:scale(1.05)}
.chat-panel{position:fixed;bottom:100px;right:24px;width:360px;height:500px;background:#fff;border-radius:12px;border:.5px solid var(--border);display:flex;flex-direction:column;z-index:200;box-shadow:0 4px 24px rgba(0,0,0,.12);animation:fadeIn 200ms ease}
.chat-header{padding:14px 16px;border-bottom:.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.chat-body{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.chat-input-area{padding:12px 16px;border-top:.5px solid var(--border);display:flex;gap:8px}
.chat-input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;font-family:inherit}
.chat-input:focus{border-color:var(--nvo-blue)}
.chat-send{background:var(--nvo-navy);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer}
.msg-user{align-self:flex-end;background:var(--nvo-navy);color:#fff;padding:10px 14px;border-radius:12px 12px 2px 12px;max-width:80%;font-size:13px;line-height:1.5}
.msg-prism{align-self:flex-start;background:#F5F7FA;color:var(--text-primary);padding:10px 14px;border-radius:12px 12px 12px 2px;max-width:85%;font-size:13px;border:.5px solid var(--border);line-height:1.5}
.suggest-pill{padding:8px 14px;border:1px solid var(--border);border-radius:99px;font-size:12px;cursor:pointer;background:#fff;color:var(--text-primary);transition:all 150ms}
.suggest-pill:hover{border-color:var(--nvo-blue);color:var(--nvo-blue)}
.nn-avatar{width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.3);box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
.nn-avatar img{width:100%;height:100%;object-fit:cover}
.board-dot{width:14px;height:14px;border-radius:50%;display:inline-block;margin:3px 4px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;font-weight:500;color:var(--text-secondary);border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.3px}
td{padding:8px 10px;border-bottom:.5px solid var(--border)}
tr.highlight{background:#F0F6FF}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:linear-gradient(90deg,var(--up) 0%,var(--amber) 50%,var(--down) 100%);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:var(--nvo-navy);cursor:pointer;border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.catalyst-card{display:flex;gap:12px;padding:12px;border-left:3px solid;border-radius:0 8px 8px 0;background:var(--card-bg);border-top:.5px solid var(--border);border-right:.5px solid var(--border);border-bottom:.5px solid var(--border);margin-bottom:8px;align-items:flex-start}
.catalyst-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.rebuttal-card{border-radius:10px;overflow:hidden;margin-bottom:10px;border:.5px solid var(--border)}
.rebuttal-bear{padding:12px 16px;font-size:13px;font-weight:600;color:#fff}
.rebuttal-bull{padding:12px 16px;font-size:13px;line-height:1.6;background:#fff}
@media(max-width:768px){

.banner{top:48px;padding:0 12px;font-size:11px}
.tab-bar{top:76px;overflow-x:auto;padding:0 8px;gap:0;justify-content:flex-start}
.tab-btn{padding:8px 14px;font-size:13px;white-space:nowrap;flex-shrink:0}
.tab-content{padding:12px 12px 44px}
.card,.card-static{padding:14px}
.hero-value{font-size:28px!important}
table{font-size:11px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
table th,table td{padding:6px 8px;white-space:nowrap}
.value{font-size:18px}
.label{font-size:11px}
.sub{font-size:11px}
.chat-panel{width:calc(100vw - 24px);right:12px;bottom:36px;max-height:70vh}
.chat-fab{bottom:40px;right:12px}
.chat-body{max-height:50vh}
.chat-input{font-size:16px}
input[type=range]{height:28px;-webkit-appearance:none;appearance:none}

.suggest-pill{padding:6px 10px;font-size:11px}
.status-bar{font-size:10px;padding:0 8px;height:24px;overflow-x:auto;white-space:nowrap}
.status-bar .flex{flex-wrap:nowrap;overflow-x:auto}
.rebuttal-card{font-size:12px}
.catalyst-card{font-size:12px}
svg{max-width:100%;height:auto}
.engine-card{min-width:0}
.grid-3 .card-static{min-width:0}
[style*='gridTemplateColumns: 1.5fr']{grid-template-columns:1fr!important}
.flex-between{flex-wrap:wrap;gap:4px}

.mt-16{margin-top:12px}

.banner{font-size:10px}
.tab-btn{padding:7px 10px;font-size:12px}
.card,.card-static{padding:10px}
table{font-size:10px}
.chat-panel{width:calc(100vw - 16px);right:8px}
.status-bar{font-size:9px;gap:4px}
.info-tooltip .tooltip-text{left:auto;right:auto;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:calc(100vw - 48px);max-width:300px}
.info-tooltip .tooltip-text::after{display:none}
}
@keyframes drawLine{to{stroke-dashoffset:0}}

const THESIS_EXPERT=`Long NVO. Base target $55, bull target $65. 18-month horizon.

Novo Nordisk trades at 7.6x EV/EBITDA, a 45% discount to the 13.9x large-cap pharma peer median, for a company that generated $46.8B in revenue, 48.4% EBITDA margins, and 33.1% net margins in FY2025. The stock sits at the 1st percentile of its own historical valuation. Three independent methods converge on $55-67: peer re-rating at 13.9x implies $67.37, a 12x discount multiple implies $54.56, and sum-of-the-parts including risk-adjusted pipeline value totals $70.19.

Three segments drive the recovery. Diabetes Care generates $35.4B anchored by Ozempic ($22.7B), with only 26.5% US patient penetration. Obesity Care generates $12.8B and is accelerating. Oral Wegovy drew 170,000 patients in its first month, Wegovy HD (7.2mg, 20.7% weight loss) was approved March 2026, and the $249/month subscription program launched March 31. Rare Disease generates $3.0B, valued at $16B on an 18x EBITDA multiple that consensus completely ignores.

The compounding crackdown is the most important unmodeled catalyst. One million patients on compounded semaglutide diverted $3-4B annually. With 130+ lawsuits filed, Hims converted from competitor to distribution partner (March 9, 2026), and FDA enforcement accelerating, the base case recovery adds $3.0B in annual revenue not in the price.

The pipeline carries $21.49 per share in risk-adjusted value, currently priced at zero. CagriSema ($17B peak revenue, 70% probability, filed with FDA). Amycretin ($20.9B NPV per Evaluate, Phase 2). Wegovy received FDA accelerated approval for MASH on August 15, 2025, with the ESSENCE trial showing 62.9% MASH resolution versus 34.3% placebo, opening a $2.6B market growing to $18.7B by 2034.

The GLP-1 market expands from $55B to $268B by 2030 at 30% CAGR. A Lilly win does not equal an NVO loss. At a conservative 20% share of $268B, NVO captures $54B versus $47B total revenue today.

The balance sheet further supports the thesis: 0.71x Net Debt/EBITDA, $34B in M&A capacity without equity issuance, 30 consecutive years of dividend increases, and a 4.0% yield at the 99th historical percentile.

Bear case floor: $28-32, requiring simultaneous failure of compounding enforcement, CagriSema rejection, and accelerated pricing collapse.`;

function useLiveData(){
  const[data,setData]=useState({...FALLBACK,delayed:false,lastUpdate:Date.now()});
  const fetchData=useCallback(async()=>{
    try{
      const res=await proxyFetch('https://query1.finance.yahoo.com/v8/finance/chart/NVO?interval=1d&range=1d');
      if(!res.ok)throw new Error('HTTP '+res.status);
      const json=await res.json();
      const meta=json.chart.result[0].meta;
      setData({price:meta.regularMarketPrice,change:meta.regularMarketPrice-meta.chartPreviousClose,changePct:((meta.regularMarketPrice-meta.chartPreviousClose)/meta.chartPreviousClose)*100,mktCap:meta.marketCap||FALLBACK.mktCap,high52:meta.fiftyTwoWeekHigh||FALLBACK.high52,low52:meta.fiftyTwoWeekLow||FALLBACK.low52,volume:meta.regularMarketVolume||FALLBACK.volume,avgVol:FALLBACK.avgVol,delayed:false,lastUpdate:Date.now()});
    }catch(e){/* embedded data used as default */}
  },[]);
  useEffect(()=>{fetchData();const id=setInterval(fetchData,60000);return()=>clearInterval(id)},[fetchData]);
  return data;
}

}
function usePriceHistory(range){

function getMarketStatus(){
  const now=new Date();const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const day=et.getDay(),mins=et.getHours()*60+et.getMinutes();
  if(day===0||day===6)return{open:false,msg:'Markets closed · Opens Monday 9:30am ET'};
  if(mins>=570&&mins<960)return{open:true,msg:null};
  if(mins<570)return{open:false,msg:'Markets closed · Opens today 9:30am ET'};
  return{open:false,msg:'Markets closed · Last close'};
}

function formatXLabel(date, range) {
  if (!date) return '';
  var d = date;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if (range === '1W') return days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
  if (range === '1M') return months[d.getMonth()] + ' ' + d.getDate();
  if (range === '6M') return months[d.getMonth()] + ' ' + d.getFullYear();
  if (range === '1Y') return months[d.getMonth()] + ' ' + d.getFullYear();
  if (range === '3Y') return 'Q' + (Math.floor(d.getMonth()/3)+1) + ' ' + d.getFullYear();
  if (range === '5Y') return '' + d.getFullYear();
  return months[d.getMonth()] + ' ' + d.getDate();
}

function LineChart(props) {
  var data=props.data, width=props.width||700, height=props.height||140, color=props.color||'#0057A8';
  var showGradient=props.showGradient!==false, animate=props.animate!==false;
  var overlays=props.overlays||[], range=props.range||'1Y';
  var padL=36, padR=40, padT=8, padB=22;
  var chartW=width-padL-padR, chartH=height-padT-padB;
  var svgRef=useRef(null);
  var hoverState=useState(null), hover=hoverState[0], setHover=hoverState[1];

  if(!data||data.length<2) return React.createElement('div',{style:{height:height,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-muted)',fontSize:13}},'Loading chart data...');

  var closes=data.map(function(d){return d.close});
  var minY=Math.min.apply(null,closes)*0.98, maxY=Math.max.apply(null,closes)*1.02;
  var rangeY=maxY-minY||1;
  var px=function(i){return padL+(i/(data.length-1))*chartW};
  var py=function(v){return padT+chartH-((v-minY)/rangeY)*chartH};

  var pathD=closes.map(function(c,i){return (i===0?'M':'L')+px(i).toFixed(1)+','+py(c).toFixed(1)}).join(' ');
  var areaD=pathD+' L'+(padL+chartW)+','+(padT+chartH)+' L'+padL+','+(padT+chartH)+' Z';
  var gradId='g'+Math.random().toString(36).substr(2,5);

  // Y-axis: 5 evenly spaced levels
  var yLevels=[];
  for(var yi=0;yi<5;yi++){var yVal=minY+rangeY*(yi/4);yLevels.push({v:yVal,y:py(yVal)})}

  // X-axis labels based on range
  var xCount=range==='1W'?5:range==='5Y'?5:4;
  var xLabels=[];
  for(var xi=0;xi<xCount;xi++){
    var idx=Math.round(xi*(data.length-1)/(xCount-1));
    if(idx<data.length)xLabels.push({i:idx,x:px(idx),label:formatXLabel(data[idx].date,range)});
  }

  var handleMouse=function(e){
    var rect=svgRef.current.getBoundingClientRect();
    var x=e.clientX-rect.left;
    var ratio=Math.max(0,Math.min(1,(x-padL*(rect.width/width))/(rect.width*(chartW/width))));
    var idx=Math.min(Math.max(Math.round(ratio*(data.length-1)),0),data.length-1);
    var p=data[idx];
    setHover({idx:idx,x:px(idx),y:py(closes[idx]),price:closes[idx],date:p.date,vol:p.vol,pctChg:((closes[idx]-closes[0])/closes[0]*100)});
  };

  var els=[
    // Defs
    showGradient?React.createElement('defs',{key:'defs'},React.createElement('linearGradient',{id:gradId,x1:0,y1:0,x2:0,y2:1},React.createElement('stop',{offset:'0%',stopColor:color,stopOpacity:.12}),React.createElement('stop',{offset:'100%',stopColor:color,stopOpacity:0}))):null,
    // Gridlines
  ];
  yLevels.forEach(function(yl,i){
    els.push(React.createElement('line',{key:'grid'+i,x1:padL,y1:yl.y,x2:padL+chartW,y2:yl.y,stroke:'#E0E4EA',strokeWidth:.5}));
  });
  // Area fill
  if(showGradient) els.push(React.createElement('path',{key:'area',d:areaD,fill:'url(#'+gradId+')'}));
  // Main line
  els.push(React.createElement('path',{key:'line',d:pathD,fill:'none',stroke:color,strokeWidth:1.5,strokeLinecap:'round',strokeLinejoin:'round',style:animate?{strokeDasharray:9999,strokeDashoffset:9999,animation:'drawLine 800ms ease forwards'}:{}}));
  // Overlays
  overlays.forEach(function(o,oi){
    if(!o.data||o.data.length<2)return;
    var oP=o.data.map(function(v,i){if(v==null)return'';return((i===0||o.data[i-1]==null)?'M':'L')+px(i).toFixed(1)+','+py(v).toFixed(1)}).filter(Boolean).join(' ');
    els.push(React.createElement('path',{key:'ov'+oi,d:oP,fill:'none',stroke:o.color,strokeWidth:1.2,strokeDasharray:o.dashed?'4,3':'none',opacity:.8}));
  });
  // Y labels
  yLevels.forEach(function(yl,i){
    var label='$'+Math.round(yl.v);
    els.push(React.createElement('text',{key:'yl'+i,x:padL-4,y:yl.y+3,fontSize:10,fill:'#9CA3AF',textAnchor:'end',fontVariantNumeric:'tabular-nums'},label));
  });
  // X labels
  xLabels.forEach(function(xl){
    var anchor=xl.i===data.length-1?'end':xl.i===0?'start':'middle';els.push(React.createElement('text',{key:'xl'+xl.i,x:xl.x,y:height-2,fontSize:10,fill:'#9CA3AF',textAnchor:anchor},xl.label));
  });
  // Hover
  if(hover){
    var ttX=Math.min(hover.x+10,padL+chartW-100);
    var ttY=Math.max(hover.y-52,padT);
    var dateStr=hover.date?hover.date.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var volStr=hover.vol?'Vol: '+(hover.vol>=1e6?(hover.vol/1e6).toFixed(1)+'M':Math.round(hover.vol/1e3)+'K'):'';
    var ttH=volStr?52:40;
    els.push(React.createElement('line',{key:'hline',x1:hover.x,y1:padT,x2:hover.x,y2:padT+chartH,stroke:'#9CA3AF',strokeWidth:.5,strokeDasharray:'3,2'}));
    els.push(React.createElement('circle',{key:'hdot',cx:hover.x,cy:hover.y,r:3.5,fill:color,stroke:'#fff',strokeWidth:2}));
    els.push(React.createElement('rect',{key:'hbg',x:ttX,y:ttY,width:100,height:ttH,rx:8,fill:'#fff',stroke:'#E0E4EA',strokeWidth:.5}));
    els.push(React.createElement('text',{key:'hdate',x:ttX+8,y:ttY+14,fontSize:11,fill:'var(--text-secondary)'},dateStr));
    els.push(React.createElement('text',{key:'hprice',x:ttX+8,y:ttY+28,fontSize:12,fill:'var(--text-primary)',fontWeight:600},'$'+hover.price.toFixed(2)));
    els.push(React.createElement('text',{key:'hpct',x:ttX+60,y:ttY+28,fontSize:11,fill:hover.pctChg>=0?'var(--up)':'var(--down)'},(hover.pctChg>=0?'+':'')+hover.pctChg.toFixed(1)+'%'));
    if(volStr) els.push(React.createElement('text',{key:'hvol',x:ttX+8,y:ttY+42,fontSize:10,fill:'var(--text-muted)'},volStr));
  }

  return React.createElement('svg',{ref:svgRef,viewBox:'0 0 '+width+' '+height,style:{width:'100%',height:height,display:'block'},onMouseMove:handleMouse,onMouseLeave:function(){setHover(null)},preserveAspectRatio:'none'},els.filter(Boolean));
}

{keys:['target','price target','55','65','base target','bull target','what is the target','pt','upside','what should i buy at'],

{keys:['why long','why buy','investment thesis','thesis','pitch','case for nvo','bull case','make the case'],

{keys:['bear case','downside','worst case','how low can it go','floor','what if it fails'],

{keys:['layman','simple','explain simply','explain like','easy terms','for beginners','what does nvo do'],

{keys:['why now','timing','when to buy','entry point','is now a good time','catalyst','what triggers the move'],

{keys:['how confident','conviction','how sure','probability','odds','likelihood'],
 answer:"Conviction is high on the base case ($55), moderate on the bull ($65).\n\nThe $55 target requires only a partial re-rating to 12x EV/EBITDA. still a 14% discount to the peer median. It does not require CagriSema approval, full compounding recovery, or any pipeline success. It simply requires the market to stop pricing NVO as if semaglutide is in permanent decline.\n\nThe $65 target requires at least one major catalyst. CagriSema approval OR full compounding recovery OR Medicare volume exceeding expectations.\n\nThree independent valuation methods, analyst consensus ($54-66 avg PT), and the stock's own historical trading range all converge on $55-65. The data is consistent.\n\nSource: Prism valuation model"},

{keys:['disagree','wrong','what if you are wrong','contrarian','skeptic','pushback'],

{keys:['prism score','score','rating','how do you rate','grade','overall assessment'],

{keys:['p/e','pe ratio','price to earnings','earnings multiple','trailing pe','forward pe'],

{keys:['fcf yield','free cash flow yield','cash flow','fcf'],

{keys:['historical valuation','valuation history','how did it used to trade','percentile','extreme'],

{keys:['peers','comparable','comp','peer group','who are the peers','benchmarking','large cap pharma'],

{keys:['nvo vs lly','compare to lilly','lilly valuation','why is lilly more expensive','valuation gap'],

{keys:['revenue','sales','top line','how much does novo make','total revenue','annual revenue'],

{keys:['ozempic','ozempic revenue','how much does ozempic make','biggest drug'],
 answer:"Ozempic generated DKK 149.9B (~$22.7B) in FY2025. the world's most prescribed GLP-1 for diabetes and the single largest revenue contributor at 48.5% of total sales.\n\nGrowth trajectory: DKK 34.9B (2021) → DKK 55.8B (2022) → DKK 100.5B (2023) → DKK 147.2B (2024) → DKK 149.9B (2025). Growth decelerated to +1.8% in FY2025 from +46.4% in FY2024, reflecting market maturation in the US diabetes segment and compounding headwinds.\n\nOzempic has proven cardiovascular benefit (SELECT trial: 20% MACE reduction) and kidney protection (FLOW trial), making it harder for payers to deny coverage.\n\nSource: Novo Nordisk Annual Report 2025"},

{keys:['wegovy revenue','wegovy sales','how much does wegovy make','obesity revenue'],

{keys:['rybelsus','oral semaglutide diabetes','oral diabetes'],

{keys:['margin','profitability','ebitda margin','gross margin','net margin','operating margin','how profitable'],

{keys:['earnings','eps','net income','bottom line','earnings per share','profit'],

{keys:['balance sheet','debt','leverage','net debt','financial health','balance sheet strong'],
 answer:"FY2025 balance sheet:\n- Cash: DKK 26.5B (~$4.0B)\n- Total debt: DKK 133.0B (~$20.1B)\n- Net debt: DKK 106.5B (~$16.1B)\n- Net Debt/EBITDA: 0.71x. extremely low leverage\n- Debt/Equity: 0.69x\n\nWith a comfortable leverage ceiling of ~2.5x Net Debt/EBITDA, NVO has approximately $30B in additional debt capacity. Combined with cash on hand, total M&A firepower without issuing equity is ~$34B.\n\nThe balance sheet is strong enough to absorb the current CapEx cycle (DKK 60.1B in FY2025) without stress.\n\nSource: Novo Nordisk 20-F 2025, novonordisk.com"},

{keys:['capex','capital expenditure','spending','investment','how much are they spending'],
 answer:"CapEx trajectory: DKK 6.3B (2021) → DKK 12.1B (2022) → DKK 25.8B (2023) → DKK 47.2B (2024) → DKK 60.1B (2025). a 9.5x increase in four years.\n\nKey investments:\n- Clayton NC Phase 2: $4.1B (2027-2029)\n- Odense quality control: $1.2B (Dec 2025)\n- Ireland oral expansion: $501M (Mar 2026)\n- 3 Catalent fill/finish sites acquired\n- 10+ global sites under expansion\n\nTotal decade commitment: DKK 65B (~$9.5B). This is the manufacturing moat being built. once complete, CapEx normalizes and FCF margin recovers from 19.1% toward 25-30%.\n\nSource: Novo Nordisk 20-F 2025"},

{keys:['free cash flow','fcf','cash generation','operating cash flow'],
 answer:"FY2025 free cash flow: DKK 58.9B (~$8.9B). FCF margin: 19.1%.\n\nOperating cash flow was strong at DKK 119.1B, but CapEx of DKK 60.1B consumed over half of it. FCF/Net Income fell to 58% from 85% in FY2023.\n\nTrajectory: DKK 48.5B (2021) → DKK 56.9B (2022) → DKK 83.2B (2023) → DKK 75.7B (2024) → DKK 58.9B (2025). The decline is entirely CapEx-driven. operating cash flow actually increased to DKK 119.1B (highest ever).\n\nAs the manufacturing buildout matures, FCF should recover to $12-15B annually by 2028-2029.\n\nSource: Novo Nordisk Annual Report 2025"},

{keys:['guidance','2026 guidance','outlook','what does management expect','forward guidance'],
 answer:"FY2026 guidance issued February 3, 2026: sales expected to fall 5-13% at constant exchange rates.\n\nThis was the most bearish guidance in NVO's recent history and triggered a major sell-off. The decline reflects: (1) IRA pricing impact on Fiasp/NovoLog (Round 1, -76%, effective Jan 2026), (2) continued compounding headwind, and (3) conservative assumptions on oral Wegovy ramp.\n\nContext: NVO management has historically guided conservatively. The guidance does NOT include potential CagriSema launch revenue, full compounding recovery, or Medicare obesity coverage (mid-2026). Upside to guidance is more likely than downside.\n\nFor comparison, LLY guided +25% for the same period. creating the perception gap that crushed NVO's stock.\n\nSource: Novo Nordisk Q4 2025 earnings call"},

{keys:['revenue by geography','us revenue','international','where does novo sell','geographic mix'],
 answer:"FY2025 revenue by geography:\n- United States: DKK 173.2B (56% of total). the dominant market\n- EUCAN (Europe + Canada): DKK 66.1B (21%)\n- China: DKK 18.7B (6%)\n- Emerging Markets: DKK 30.4B (10%)\n- APAC: DKK 20.7B (7%)\n\nUS remains the profit engine, generating >60% of operating income. International markets are growing faster but at lower margins. Oral Wegovy is strategically critical for emerging markets. no cold chain required, room temperature storage enables standard pharmacy distribution.\n\nSource: Novo Nordisk Annual Report 2025"},

{keys:['roic','roe','roa','return on','capital efficiency','returns'],
 answer:"FY2025 capital efficiency:\n- ROIC: 33.0% (down from 67.6% in 2023)\n- ROE: 56.8% (down from 94.3% in 2023)\n- ROA: 23.5% (down from 39.6% in 2023)\n\nThe decline is driven by the massive CapEx cycle (DKK 60.1B in FY2025) expanding the capital base. Even at compressed levels, a 33% ROIC and 57% ROE are exceptional for any company, indicating that NVO generates outstanding returns on the capital it deploys.\n\nSource: Novo Nordisk Annual Report 2025, Prism derived calculations"},

{keys:['lilly','eli lilly','lly','zepbound','mounjaro','tirzepatide','competition','competitor','vs lly','biggest competitor'],
 answer:"Eli Lilly is the primary competitor. Per CB Insights, Novo is running 21 active clinical trials in obesity and diabetes, nearly double Lilly's 12. The head-to-head comparison:\n\nRevenue: NVO $46.8B vs LLY ~$45.1B. essentially identical\nEBITDA margin: NVO 48.4% vs LLY 43.4%. NVO wins\nMarket cap: NVO $164B vs LLY $884B. 5.4x gap for the same revenue\n\nZepbound/Mounjaro (tirzepatide) achieves ~22.5% weight loss vs Wegovy's ~15%. That efficacy gap is real. But the GLP-1 market is expanding from $55B (2024) to $268B by 2030. 30% annual growth. Even if Lilly takes 50% share, NVO's addressable market still grows. At a conservative 20% share of $268B, NVO captures $54B vs $47B total revenue today.\n\nA Lilly win does not equal an NVO loss.\n\nSource: Perplexity Finance, BCC Research, novonordisk.com"},

{keys:['glp-1 market','market size','obesity market','how big is the market','tam','total addressable'],
 answer:"The GLP-1 market is the fastest-growing pharmaceutical segment in history. Per CB Insights, 11 pharmaceutical companies are now advancing obesity treatments, including Pfizer, Boehringer Ingelheim, Amgen, and Roche (which acquired Carmot Therapeutics for $2.7B).\n\nTotal GLP-1 market: $54.8B (2024) → $268.4B by 2030, 30.6% CAGR (BCC Research)\nAnti-obesity drugs: $6.6B → $25-60B by 2030 (Strategic Market Research / Grand View Research)\nGoldman Sachs obesity forecast: $130B by 2030\nGLP-1 diabetes sub-market: $34.5B → $88.8B by 2034, 17.1% CAGR (Custom Market Insights)\n\nPatient penetration is still under 5% of eligible adults globally. At 10% penetration of 800M+ eligible adults = 80M patients. The market is supply-constrained and penetration-constrained, not demand-constrained.\n\nSource: BCC Research, Grand View Research, Goldman Sachs, CDC"},

{keys:['penetration','how many patients','adoption','how many people use glp-1','eligible'],
 answer:"GLP-1 patient penetration remains structurally low. The 2023 World Obesity Atlas projects 50% of the global population will be overweight or obese by 2035, up from 38% in 2020 (per CB Insights/Roche analysis). This is the demand tailwind.. the most important long-term data point.\n\nUS adults with diabetes using GLP-1: 26.5% (~6.9M adults). CDC data\nGlobal penetration of all eligible patients: under 5%\nGlobal eligible adult population: 800M+ (25%+ of adults aged 25-64 across 99 countries)\n\nPenetration scenarios:\n- 5% penetration: 40M patients\n- 10% penetration: 80M patients\n- 15% penetration: 120M patients\n\nThe rate at which penetration grows. not competitive market share battles. is the primary driver of NVO's long-term value. Both NVO and LLY can grow simultaneously in a market this underpenetrated.\n\nSource: CDC NCHS Data Brief, HealthVerity, The Cardiology Advisor"},

{keys:['orforglipron','lilly oral','lly oral','oral competition'],
 answer:"Orforglipron (Eli Lilly's oral non-peptide GLP-1) has an FDA decision expected Q2 2026. Per CB Insights, Lilly is investing in AI-driven drug discovery through partnerships with OpenAI and Isomorphic Laboratories.\n\nATTAIN-1 trial results: -11.2% mean body weight change at 72 weeks (highest dose, 36mg) vs -2.1% placebo. Competitive but below injectable benchmarks. Wegovy injectable achieves ~15%, Zepbound ~22.5%.\n\nOrforglipron is a market expander, not primarily a share stealer. It brings new patients who refuse injections into the GLP-1 ecosystem. NVO's oral Wegovy (approved Dec 2025) already has a first-mover advantage in the oral obesity space with comparable efficacy to injectable semaglutide.\n\nSource: Prime Therapeutics, Clarivate"},

{keys:['retatrutide','triple agonist','lly pipeline','lilly pipeline','next gen'],
 answer:"Retatrutide is Eli Lilly's GLP-1/GIP/Glucagon triple agonist in Phase 3, with ~24% weight loss in trials. the highest of any obesity drug. Expected approval: 2027-2028. Peak revenue estimate: $15-20B.\n\nKey nuance: lean mass loss (~38% of total weight loss) is within the 20-40% range seen with semaglutide and tirzepatide, suggesting no incremental muscle-wasting risk despite greater total weight loss.\n\nNVO's response: UBT251 (triple agonist, Phase 2, positive data March 2026) and CagriSema higher dose (REDEFINE 11 trial, data H1 2027). The next-generation pipeline race is ongoing. NVO is not standing still.\n\nSource: Clarivate, FierceBiotech"},

{keys:['amgen','maritide','amg 133'],
 answer:"MariTide (AMG 133) is Amgen's GLP-1/GIPR antagonist bispecific antibody, currently in Phase 3.\n\nPhase 2 data: ~14.5% body weight reduction at 12 weeks. Expected approval: 2028+. Peak revenue estimate: $3-5B.\n\nMariTide is differentiated by monthly dosing. it attracts a different patient population than weekly or daily GLP-1s. It is classified as a market expander, not a direct NVO substitute. The mechanism (GLP-1 agonist + GIP receptor antagonist) is novel and could address patients who don't respond well to GLP-1/GIP dual agonists.\n\nSource: Amgen pipeline data, PitchBook"},

{keys:['viking','vk2735','vktx'],
 answer:"Viking Therapeutics (VKTX) has VK2735, a GLP-1/GIP dual agonist in Phase 3 for obesity.\n\nPhase 2 data: ~14.7% body weight reduction at 13 weeks (subcutaneous). An oral formulation is also in Phase 2. Viking raised $632.5M in a February 2024 public offering, reflecting strong investor conviction.\n\nViking is widely regarded as an acquisition target. it validates the GLP-1/GIP mechanism but lacks commercial infrastructure. A Viking acquisition by a major pharma company would not threaten NVO; it would confirm market expansion.\n\nSource: PitchBook, Viking Therapeutics pipeline"},

{keys:['structure','gpcr','ct-996','oral small molecule'],
 answer:"Structure Therapeutics (GPCR) is developing CT-996, an oral small-molecule GLP-1 agonist in Phase 2.\n\nTotal funding: $1.15B, including a $747.5M PIPE in December 2025. the scale signals institutional conviction in the oral small-molecule GLP-1 space. 218 employees, based in San Francisco.\n\nCT-996 is a market expander for developing markets where cold chain infrastructure is limited. It would compete with NVO's oral Wegovy and LLY's orforglipron but expands the addressable patient pool rather than splitting existing patients.\n\nSource: PitchBook"},

{keys:['altimmune','pemvidutide','alt'],
 answer:"Altimmune (ALT) is developing pemvidutide, a GLP-1/Glucagon dual agonist in Phase 2 for obesity and MASH.\n\n57 employees. Total funding: $244.9M, with a $75M PIPE in January 2026. Based in Gaithersburg, MD.\n\nPemvidutide is differentiated by its MASH focus. the GLP-1/glucagon dual mechanism addresses liver fat reduction alongside weight loss. This targets a different clinical need than pure obesity drugs and is classified as a different-segment competitor.\n\nSource: PitchBook"},

{keys:['market share','nvo share','who is winning','prescription share','trx'],
 answer:"NVO US obesity market share: 36.4% as of October 2025, and rising.\n\nPrescription trends:\n- Wegovy TRx: stable at -0.4% week-over-week\n- Zepbound TRx: declining at -2.8% week-over-week\n- GLP-1 prescriptions as % of all US Rx: >7% as of December 2025\n\nThe CVS formulary switch (July 2025) to preferred Wegovy coverage over Zepbound covers 90M+ lives and is still flowing through patient volumes. This is a meaningful tailwind for NVO market share through 2026.\n\nSource: Kontra Investments, Forbes/Truveta"},

{keys:['adherence','discontinuation','persistence','do people stay on','compliance','drop off'],
 answer:"GLP-1 adherence is improving but remains a challenge:\n\n12-month discontinuation rate: ~52% (TCTMD study, Sep 2025)\n12-month persistence (2024 cohort): 63%. up significantly from 40% in 2023\n3-year persistence: 14% (Prime Therapeutics)\n2-year average proportion of days covered: 40.7%\n\nThe improving trend (40% → 63% one-year persistence) reflects better insurance coverage, supply normalization, and oral alternatives reducing injection burden. Oral Wegovy and subscription programs ($249/mo) should further improve adherence by lowering access barriers.\n\nSource: TCTMD, HealthVerity, Prime Therapeutics"},

{keys:['mash','nash','liver','liver disease','fatty liver','essence trial','hidden catalyst','steatohepatitis','liver fibrosis'],
 answer:"MASH is the most underappreciated catalyst in the NVO thesis.\n\n115 million people globally have this progressive liver disease, caused by the same fat buildup that drives obesity. The ESSENCE Phase 3 trial (NEJM, Jun 2025) showed semaglutide achieves 62.9% MASH resolution vs 34.3% placebo, and 36.8% fibrosis improvement vs 22.4% placebo. The FDA granted accelerated approval on August 15, 2025, making Wegovy the first GLP-1 approved for MASH.\n\nThe MASH drug market: $2.6B (2024), growing to $18.7B by 2034 at 22% CAGR. Rezdiffra (the only other approved treatment) hit $958M in its first full year from just 36,250 patients out of 6.7 million drug-eligible Americans. Penetration is under 0.5%.\n\nPeak revenue estimate: $1.9B incremental (BMO Capital), with bull case potential of $5B as the market expands. Per-share value: $2.61 (base case).\n\nThe key insight: no new drug needed, no new manufacturing, no new safety data. Semaglutide has 10M+ patient-years of safety exposure. This is incremental revenue from existing infrastructure. It is the only drug that simultaneously treats liver disease, obesity, cardiovascular risk, kidney disease, and glycemic control. Analyst consensus has priced this at zero.\n\nSource: FDA.gov (Aug 15, 2025), NEJM, BMO Capital, ResearchAndMarkets, Madrigal 10-K 2025"},

{keys:['pipeline','drug pipeline','what drugs','r&d','research','development','what is in the pipeline'],
 answer:"NVO has one of the deepest pipelines in pharma. Per CB Insights, Novo is running 21 active clinical trials in obesity and diabetes, nearly double Eli Lilly's 12. The aggregate risk-adjusted NPV is $21.49/share. currently priced at zero.\n\nKey assets:\n- CagriSema: Filed Dec 2025. $17B peak revenue. 70% PoS. rNPV: $47.6B ($10.71/share)\n- Oral Wegovy: Approved Dec 2025. $3B incremental. rNPV: $12.0B ($2.70/share)\n- Semaglutide MASH: Phase 3 filed. $5B peak. rNPV: $11.6B ($2.61/share)\n- Amycretin: Phase 2. $8B peak. rNPV: $6.4B ($1.44/share)\n- Insulin icodec (Awiqli): Approved. $3B peak. rNPV: $10.5B ($2.36/share)\n- Mim8 (hemophilia): Submitted US/EU. $3-5B peak\n- Ziltivekimab (CV inflammation): Phase 3. Readout H2 2026\n\nOne pipeline miss: Alzheimer's (EVOKE) failed Nov 2025.\n\nSource: Novo Nordisk pipeline (novonordisk.com), FierceBiotech, Evaluate"},

{keys:['cagrisema','amylin','cagrilintide','what is cagrisema','nvo next drug'],
 answer:"CagriSema is NVO's most important pipeline asset. a combination of semaglutide (GLP-1) and cagrilintide (amylin analogue). Filed with the FDA in December 2025.\n\nClinical data:\n- REDEFINE T2D (Phase 3): 14.2% weight loss vs 10.2% for semaglutide alone, 1.91% HbA1c reduction at 68 weeks\n- REDEFINE 1 (obesity): ~22-24% weight loss\n- REDEFINE 11 (higher dose): Data expected H1 2027. could show 25%+ weight loss\n\nThe challenge: CagriSema showed ~20% weight loss vs Zepbound's ~23% head-to-head. The market was expecting CagriSema to match or beat tirzepatide.\n\nPeak revenue estimate: $17B by 2032. Probability of approval: 70%. rNPV: $47.6B ($10.71/share).\n\nSource: FierceBiotech, Novo Nordisk IR"},

{keys:['amycretin','oral amycretin','nvo oral pipeline','next gen oral'],
 answer:"Amycretin is NVO's next-generation oral GLP-1/amylin agonist, currently in Phase 2.\n\nPhase 1 data: 13.1% weight loss at just 12 weeks. Phase 2 data: up to 14.5%. For comparison, injectable semaglutide achieves ~15% at 68 weeks. amycretin's trajectory suggests it could eventually surpass Wegovy on efficacy with an oral formulation.\n\nRanked #2 globally by NPV per Evaluate, with $20.9B NPV. Expected Phase 3 entry: Q1 2026. Expected approval: 2028+.\n\nAmycretin represents NVO's answer to the next-generation obesity race. an oral pill with potentially best-in-class efficacy.\n\nSource: Labiotech, Drug Discovery Trends, Evaluate"},

{keys:['oral wegovy','wegovy pill','oral obesity','pill form','no injection'],
 answer:"Oral Wegovy (oral semaglutide for obesity) was approved December 2025 and drew 170,000 patients in its first month. CEO Doustdar called it 'the best launch pharma has seen.'\n\nWhy it matters:\n- Removes injection barrier entirely (a key reason patients chose compounding)\n- Room temperature storage. no cold chain required\n- Enables telehealth, mail-order, and emerging market distribution\n- Weight loss comparable to injectable semaglutide (~15%)\n\nSubscription pricing: $249/mo (12-month plan). Lower-dose pills: $149/mo.\n\nOral Wegovy is strategically transformational. it changes the distribution model from specialty pharmacy to mass-market retail.\n\nSource: Novo Nordisk Q4 2025 earnings call, novonordisk.com"},

{keys:['wegovy hd','7.2','high dose','step up','20.7','higher dose wegovy'],
 answer:"Wegovy HD (7.2mg injectable) was FDA-approved in March 2026 after the STEP UP trial showed 20.7% mean weight loss. a significant improvement over the standard 2.4mg dose (~15%).\n\nThis is strategically critical because it closes the efficacy gap with Zepbound's ~22.5%. The narrative that 'Lilly has better weight loss' becomes much weaker when Wegovy HD delivers 20.7% vs Zepbound's 22.5%. a 1.8 percentage point gap rather than the 7.5pp gap with standard Wegovy.\n\nWegovy HD will be added to the subscription program and is expected to become the preferred dose for patients seeking maximum weight loss.\n\nSource: MarketBeat, Novo Nordisk IR"},

{keys:['rnpv','pipeline value','pipeline worth','what is the pipeline worth','pipeline npv'],
 answer:"The NVO pipeline has an aggregate risk-adjusted NPV (rNPV) of $95.5B. or $21.49 per share. The market is currently pricing this at zero.\n\nAsset-level breakdown:\n- CagriSema: $47.6B ($10.71/share). 70% PoS, $17B peak revenue\n- Oral Wegovy incremental: $12.0B ($2.70/share). 100% PoS (approved)\n- Semaglutide MASH: $11.6B ($2.61/share). 58% PoS, $5B peak\n- Insulin icodec (Awiqli): $10.5B ($2.36/share). 100% PoS (approved)\n- Amycretin: $6.4B ($1.44/share). 20% PoS, $8B peak\n- Monlunabant: $2.4B ($0.54/share). 20% PoS, $3B peak\n- Other pipeline aggregate: $5.0B ($1.12/share)\n\nMethodology: PoS × peak revenue × 40% net margin × 10x capitalization multiple.\n\nSource: Prism rNPV model, Evaluate"},

{keys:['alzheimer','evoke','brain','neurology','failed trial'],
 answer:"The Alzheimer's program (EVOKE/EVOKE+) failed in November 2025. Despite observational data associating semaglutide with reduced Alzheimer's risk, the randomized Phase 3 trial did NOT confirm superiority vs placebo.\n\nThis was the one material pipeline miss. The potential indication had been speculated at $5-10B+ peak sales. The failure is final. the program is likely discontinued for this indication.\n\nImpact on thesis: Limited. The Alzheimer's program was not included in the base case rNPV calculation. The core obesity/diabetes franchise and CagriSema pipeline remain intact.\n\nSource: Drug Discovery Trends"},

{keys:['awiqli','icodec','insulin icodec','weekly insulin','once weekly insulin'],
 answer:"Insulin icodec (brand name Awiqli) is the first once-weekly basal insulin. approved in multiple markets and now launching.\n\nPeak revenue estimate: $3B. This is a compliance game-changer: patients replace 365 daily injections with 52 weekly injections. The convenience advantage is significant for diabetes management adherence.\n\nIcoSema (insulin icodec + semaglutide combination) is in Phase 3, offering a once-weekly shot combining basal insulin and GLP-1. unique in the market for compliance. Expected data: 2027+.\n\nSource: Novo Nordisk pipeline (novonordisk.com)"},

{keys:['mim8','hemophilia','alhemo','concizumab','rare blood','hemlibra'],
 answer:"NVO's hemophilia franchise:\n\nAlhemo (concizumab): Anti-TFPI antibody. Approved Dec 2024 (patients with inhibitors) and Jul 2025 (non-inhibitors). First once-daily subcutaneous prophylaxis for hemophilia. Achieved 86% annualized bleeding rate reduction.\n\nMim8: Bispecific antibody mimicking Factor VIIIa activity. Submitted to US and EU regulators in 2025. This directly targets Roche's $4.8B Hemlibra franchise. Peak revenue estimate: $3-5B.\n\nHemophilia market: $14.1B (2024) → $21.1B by 2030 at 6.9% CAGR (Grand View Research). NVO is building a serious rare blood disorders franchise that consensus completely ignores.\n\nSource: Novo Nordisk IR, Grand View Research"},

{keys:['r&d spend','research spending','how much on research','r&d budget','innovation'],
 answer:"FY2025 R&D: DKK 52.0B (~$7.9B), or 16.8% of revenue. tripled since 2020.\n\nR&D benchmarking:\n- NVO: 16.8% of revenue\n- LLY: ~25%\n- AZN: ~25%\n- AMGN: ~22%\n\nNVO spends relatively less on R&D as a percentage of revenue because its core GLP-1 franchise generates massive revenue. In absolute terms, $7.9B is a substantial R&D budget. larger than most biotech companies' total revenue.\n\nR&D efficiency is high: NVO has 15+ clinical-stage assets across obesity, diabetes, MASH, hemophilia, cardiovascular, and rare disease.\n\nSource: Novo Nordisk Annual Report 2025, Statista"},

{keys:['select trial','cardiovascular','cv benefit','heart','mace'],
 answer:"The SELECT trial demonstrated semaglutide reduces major adverse cardiovascular events (MACE) by 20% in overweight/obese adults. This label expansion was approved and included in Wegovy's prescribing information.\n\nWhy it matters: cardiovascular benefit makes it harder for payers to deny GLP-1 coverage. The SELECT data transforms Wegovy from a 'weight loss drug' (easy to restrict) into a 'cardiovascular risk reduction therapy' (hard to deny). This has direct implications for insurance coverage expansion.\n\nSource: Novo Nordisk IR (novonordisk.com)"},

{keys:['flow trial','kidney','ckd','chronic kidney','renal'],
 answer:"The FLOW trial showed semaglutide provides significant kidney protection in patients with chronic kidney disease (CKD) and type 2 diabetes. This label expansion has been approved.\n\nSemaglutide now has proven benefits across: weight loss, diabetes control, cardiovascular risk reduction (SELECT), kidney protection (FLOW), and sleep apnea improvement. Each label expansion widens the addressable patient population and strengthens the case for payer coverage.\n\nSource: Novo Nordisk IR (novonordisk.com)"},

{keys:['sleep apnea','sleep','apnea','ahi'],
 answer:"Semaglutide showed clinically meaningful improvement in the apnea-hypopnea index (AHI) in Phase 3 trials for obstructive sleep apnea. Regulatory filing for this label expansion is expected.\n\nSleep apnea affects an estimated 936 million adults globally, with significant overlap in the obese/overweight population already eligible for GLP-1 therapy. This represents another indication expansion that strengthens payer coverage arguments.\n\nSource: Novo Nordisk pipeline (novonordisk.com)"},

{keys:['compound','compounding','crackdown','illegal','copycat','knockoff','fake','counterfeit'],
 answer:"The compounding crackdown is the single most important unmodeled bull catalyst.\n\nScale: ~1 million patients were on compounded semaglutide as of mid-2025, diverting $3-4B annually from NVO. CEO Jorgensen confirmed this in the Q2 2025 earnings call.\n\nTimeline: FDA declared the semaglutide shortage resolved on Feb 21, 2025. The final deadline for 503B outsourcing facilities to cease production was May 22, 2025. NVO has filed 130+ lawsuits across 40 states. One compounder (MediOak Pharmacy, TN) was found selling product with no semaglutide at all.\n\nThe compounding recovery of $3-4B annually represents $5-7 per share not in the current price.\n\nSource: FDA.gov, Novo Nordisk press releases, Yahoo Finance"},

{keys:['hims','hers','hims and hers','partnership','settlement','hims deal'],
 answer:"On March 9, 2026, NVO settled with Hims & Hers. converting its largest DTC competitor into a distribution partner.\n\nKey terms: Hims stops advertising/promoting compounded semaglutide (restricts to 'rare situations' of medical necessity only). Hims will sell branded Ozempic and Wegovy at the same self-pay prices as NVO's other telehealth partners. Existing Hims compounded patients will have the chance to transition to FDA-approved medications.\n\nFDA Commissioner Makary praised the deal publicly. NVO drops its lawsuit but retains the right to reinitiate if needed.\n\nThis is strategically transformational. Hims was the single largest DTC channel for compounded semaglutide.\n\nSource: CNBC, Pharmaphorum"},

{keys:['fda','enforcement','shortage','resolved','legal','lawsuit','503','outsourcing'],
 answer:"FDA enforcement timeline:\n\n- Feb 21, 2025: FDA declares semaglutide shortage RESOLVED\n- Apr 24, 2025: Court denies OFA preliminary injunction. key legal victory\n- May 22, 2025: FINAL deadline for 503B outsourcing facilities\n- Feb 6, 2026: FDA announces 'all available compliance and enforcement tools'\n- Feb 8, 2026: NVO files lawsuit against Hims & Hers\n- Mar 9, 2026: NVO-Hims settlement\n\nEnforcement actions: 130+ lawsuits across 40 states, $8.5M default judgment (Delaware), permanent injunctions against pharmacies selling fake product, 18 state boards issued alerts.\n\nPending: 'Difficult to compound' petition. if granted, permanently prohibits compounding of semaglutide.\n\nSource: FDA.gov, Novo Nordisk press releases"},

{keys:['recovery model','compounding recovery','how much comes back','patient conversion','recapture'],
 answer:"Compounding revenue recovery model:\n\nBaseline: ~1 million patients on compounded sema, diverting $3-4B annually.\n\nBear case: 40% conversion, 400K patients, $4,000/yr net = +$1.6B annually\nBase case: 60% conversion, 600K patients, $5,000/yr net = +$3.0B annually\nBull case: 80% conversion, 800K patients, $5,000/yr net = +$4.0B annually\n\nSeven catalysts stacking simultaneously in 2026: FDA enforcement, 130+ lawsuits, Hims partnership, $249/mo subscription, oral Wegovy (no injection), CVS formulary switch, Medicare coverage.\n\nThe base case $3.0B recovery equates to roughly $5-7 per share not priced into the stock.\n\nSource: Prism recovery model, Novo Nordisk earnings calls"},

{keys:['subscription','wegovy subscription','249','self pay','cash pay','out of pocket','affordability','price program'],
 answer:"Wegovy Subscription Program launched March 31, 2026:\n\nInjectable (0.25-2.4mg):\n- 3-month plan: $329/mo\n- 6-month plan: $299/mo\n- 12-month plan: $249/mo (saves $1,200/yr)\n\nOral pill (9mg, 25mg):\n- 3-month: $289/mo\n- 6-month: $269/mo\n- 12-month: $249/mo\n\nLower-dose pills (1.5mg, 4mg): $149/mo without subscription.\nCommercially insured patients: as low as $25/mo through existing savings programs.\n\nAvailable through: Ro, WeightWatchers, LifeMD, Sesame (Hims joining later).\n\nThe $249/mo price directly undercuts compounders, which typically charged $300-400/mo for unregulated product.\n\nSource: Pharmaceutical Executive, NJBIZ"},

{keys:['cvs','formulary','insurance coverage','payer','preferred'],

{keys:['difficult to compound','petition','permanent ban','can they stop it forever'],

{keys:['compounding risk','what if compounding continues','compounders still operating','loophole'],

{keys:['2027 obesity','obesity projection','obesity forecast','how big will obesity be'],

{keys:['cold chain','distribution','supply chain advantage','room temperature','mail order'],

{keys:['rare disease','hidden','rare disease segment','rare disease revenue','overlooked segment'],

{keys:['sogroya','growth hormone','somapacitan','gh','growth hormone market'],

{keys:['hemophilia market','blood disorder market','rare blood market size'],

{keys:['rare disease valuation','rare disease sotp','segment worth','what is rare disease worth'],

{keys:['forma','etavopivat','sickle cell','omeros','zaltenibart','pnh'],

{keys:['ceo','doustdar','maziar','who runs novo','new ceo','management','leadership'],

{keys:['jorgensen','lars','old ceo','previous ceo','why did the ceo leave','ceo change'],

{keys:['board','directors','board composition','who is on the board','board overhaul'],

{keys:['foundation','novo nordisk foundation','ownership','who owns novo','control','voting rights'],
 answer:"The Novo Nordisk Foundation holds 28.1% of capital and 77.3% of voting rights.\n\nStructure: NVO has two share classes. A shares (unlisted, 10 votes each, 1.075B shares) and B shares (listed, 1 vote each, 3.390B shares). The Foundation holds all A shares plus some B shares.\n\nCritical constraints:\n- A shares cannot be sold. permanently held\n- Foundation must maintain at least 25.5% of total share capital\n- Foundation depends on NVO dividends for its philanthropic income\n\nThis creates structural anti-dilution protection: the Foundation will never approve equity issuance at distressed prices because it would dilute its own control below the 25.5% floor. NVO has never issued equity for M&A. and at 77% voting control, the Foundation ensures this continues.\n\nSource: Novo Nordisk Foundation website, 20-F 2025"},

{keys:['dividend','yield','income','payout','30 year','consecutive','dividend history','dividend growth'],

{keys:['buyback','share count','dilution','repurchase','treasury','equity structure','share repurchase'],

{keys:['capital return','shareholder return','total return','how much returned','cash returned'],

{keys:['manufacturing','manufacturing moat','factory','production','capacity','how hard to copy','barrier to entry'],

{keys:['ira','medicare','medicaid','price cut','negotiation','inflation reduction','245','policy','government pricing'],

{keys:['trump','trump deal','government deal','white house','political risk'],

{keys:['india generic','india','dr reddy','emerging market generic','generic launch'],

{keys:['oral patent','oral formulation','new patents','formulation patent','patent extension'],

{keys:['catalent','catalent acquisition','fill finish','fill/finish'],

{keys:['generic delay','how long until generics','generic timeline','when do generics arrive'],

{keys:['pricing risk','price cut risk','pricing pressure','drug pricing','can they raise prices'],

function prismAnswer(msg, isLayman) {
  var q = msg.toLowerCase().trim();
  q = q.replace(/[?!.,;:'"()\[\]{}]/g, ' ').replace(/\s+/g, ' ').trim();
  var bestMatch = null;
  var bestScore = 0;
  for (var i = 0; i < PRISM_KB.length; i++) {
    var entry = PRISM_KB[i];
    var score = 0;
    var matchCount = 0;
    for (var j = 0; j < entry.keys.length; j++) {
      var key = entry.keys[j].toLowerCase();
      if (q.indexOf(key) !== -1) {
        score += key.length * (key.indexOf(' ') !== -1 ? 1.5 : 1);
        matchCount++;
      }
    }
    if (matchCount > 1) score *= (1 + matchCount * 0.15);
    if (score > bestScore) {
      bestScore = score;
      bestMatch = entry;
    }
  }
  var raw = bestMatch && bestScore > 2 ? bestMatch.answer : "NVO trades at 7.6x EV/EBITDA, a 45% discount to the 13.9x peer median. The $55 base target is supported by peer re-rating, compounding recovery (+$3B unmodeled), and pipeline value of $21.49/share priced at zero.\n\nTry asking about: target price, risks, compounding, Lilly competition, pipeline, rare disease, patents, dividends, technicals, governance, valuation, or manufacturing.";
  return raw;
}
