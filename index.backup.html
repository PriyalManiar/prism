/* ===== COUNT-UP HOOK ===== */
function useCountUp(target,duration=800,decimals=0){
  const[val,setVal]=useState(0);
  const ref=useRef(null);
  useEffect(()=>{
    if(target==null)return;
    const start=performance.now();
    const animate=now=>{
      const elapsed=now-start;
      const progress=Math.min(elapsed/duration,1);
      const eased=1-Math.pow(1-progress,3);
      setVal(eased*target);
      if(progress<1)ref.current=requestAnimationFrame(animate);
    };
    ref.current=requestAnimationFrame(animate);
    return()=>cancelAnimationFrame(ref.current);
  },[target,duration]);
  return decimals>0?val.toFixed(decimals):Math.round(val);
}

      const ts=json.chart.result[0].timestamp;
      const closes=json.chart.result[0].indicators.quote[0].close;
      const vols=json.chart.result[0].indicators.quote[0].volume;
      const avgVol=vols.filter(Boolean).reduce((a,b)=>a+b,0)/vols.filter(Boolean).length;
      setData({
        price:meta.regularMarketPrice,
        change:meta.regularMarketPrice-meta.chartPreviousClose,
        changePct:((meta.regularMarketPrice-meta.chartPreviousClose)/meta.chartPreviousClose)*100,
        mktCap:meta.marketCap||FALLBACK.mktCap,
        high52:meta.fiftyTwoWeekHigh||FALLBACK.high52,
        low52:meta.fiftyTwoWeekLow||FALLBACK.low52,
        volume:meta.regularMarketVolume||FALLBACK.volume,
        avgVol:Math.round(avgVol),
        delayed:false,
        lastUpdate:Date.now(),
        prices:closes.filter(Boolean),
        timestamps:ts,
      });
    }catch(e){setData(d=>({...d,delayed:true}))}

      .then(r=>r.json()).then(d=>{
        const r=d.chart.result[0];
        const ts=r.timestamp||[];
        const q=r.indicators.quote[0];
        const prices=ts.map((t,i)=>({date:new Date(t*1000),close:q.close[i],high:q.high?.[i],low:q.low?.[i],open:q.open?.[i],vol:q.volume?.[i]})).filter(p=>p.close!=null);

/* ===== MARKET HOURS ===== */
function getMarketStatus(){
  const now=new Date();
  const et=new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const day=et.getDay(),h=et.getHours(),m=et.getMinutes();
  const mins=h*60+m;
  if(day===0||day===6)return{open:false,msg:'Markets closed \u00b7 Opens Monday 9:30am ET'};
  if(mins>=570&&mins<960)return{open:true,msg:null};
  if(mins<570)return{open:false,msg:'Markets closed \u00b7 Opens today 9:30am ET'};
  return{open:false,msg:'Markets closed \u00b7 Last close'};
}

/* ===== ASK PRISM CHATBOT ===== */
function AskPrism({isLayman}){
  const[open,setOpen]=useState(false);
  const[messages,setMessages]=useState([]);
  const[input,setInput]=useState('');
  const[loading,setLoading]=useState(false);
  const bodyRef=useRef(null);
  const suggests=['Why is $55 the base target?','What is the biggest risk?','Explain the compounding recovery','Why buy NVO over Lilly?'];

  const send=async(msg)=>{
    if(!msg.trim())return;
    const newMsgs=[...messages,{role:'user',content:msg}];
    setMessages(newMsgs);setInput('');setLoading(true);
    try{
      const sysPrompt=PRISM_SYSTEM+(isLayman?'\n\nThe user is in Layman Mode — use plain English, no jargon.':'\n\nThe user is in Expert Mode — use precise financial language.');
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sysPrompt,messages:newMsgs.map(m=>({role:m.role,content:m.content}))})});
      const data=await res.json();
      const reply=data.content?.[0]?.text||'I encountered an issue. Please try again.\n\n— Prism';
      setMessages([...newMsgs,{role:'assistant',content:reply}]);
    }catch(e){setMessages([...newMsgs,{role:'assistant',content:'Connection issue. Please try again shortly.\n\n— Prism'}])}
    setLoading(false);
  };

  useEffect(()=>{bodyRef.current?.scrollTo(0,bodyRef.current.scrollHeight)},[messages]);

  if(!open)return React.createElement('div',{className:'chat-fab'},
    React.createElement('button',{className:'chat-fab-btn',onClick:()=>setOpen(true)},React.createElement(PrismLogo,{size:20})),
    React.createElement('div',{style:{textAlign:'center',fontSize:11,color:'var(--text-muted)',marginTop:4}},'Ask Prism'),
  );

  return React.createElement('div',{className:'chat-panel'},
    React.createElement('div',{className:'chat-header'},
      React.createElement('div',{className:'flex gap-8'},React.createElement(PrismLogo,{size:16}),React.createElement('span',{style:{fontSize:14,fontWeight:500}},'Prism')),
      React.createElement('div',{className:'flex gap-8'},React.createElement('span',{style:{fontSize:11,color:'var(--text-muted)'}},'NVO Analyst'),React.createElement('button',{onClick:()=>setOpen(false),style:{background:'none',border:'none',cursor:'pointer',fontSize:16,color:'var(--text-muted)'}},'\u00d7')),
    ),
    React.createElement('div',{ref:bodyRef,className:'chat-body'},
      messages.length===0&&React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}},
        ...suggests.map((s,i)=>React.createElement('button',{key:i,className:'suggest-pill',onClick:()=>send(s)},s))),
      ...messages.map((m,i)=>React.createElement('div',{key:i,className:m.role==='user'?'msg-user':'msg-prism',style:{whiteSpace:'pre-wrap'}},m.content)),
      loading&&React.createElement('div',{className:'msg-prism',style:{color:'var(--text-muted)'}},'Analyzing...'),
    ),
    React.createElement('div',{className:'chat-input-area'},
      React.createElement('input',{className:'chat-input',value:input,onChange:e=>setInput(e.target.value),onKeyDown:e=>e.key==='Enter'&&send(input),placeholder:'Ask about NVO...'}),
      React.createElement('button',{className:'chat-send',onClick:()=>send(input)},'\u2192'),
    ),
  );
}
